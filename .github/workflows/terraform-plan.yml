name: Terraform Plan

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: terraform
  cancel-in-progress: true

jobs:
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      TF_VAR_github_organization: ${{ vars.GITHUB_ORG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.0

      - name: Terraform fmt
        run: terraform fmt -check -no-color -recursive

      - name: Initialise Terraform
        run: terraform init

      - name: Validate Terraform
        run: terraform validate

      - name: Plan Terraform
        id: plan
        run: terraform plan -out=terraform.plan

      - name: Show plan
        run: terraform show -no-color -json terraform.plan > terraform.json

      - uses: liatrio/terraform-change-pr-commenter@v1.7.0
        with:
          json-file: terraform.json
          log-changed-resources: false

      - name: Archive Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform.plan
          if-no-files-found: error
