name: Terraform Plan

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      TF_VAR_github_organization: ${{ vars.GITHUB_ORG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.15"

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');
            const maxLength = 65000;
            const truncated = planOutput.length > maxLength
              ? planOutput.slice(0, maxLength) + '\n\n... output truncated (exceeded GitHub comment limit) ...'
              : planOutput;

            const status = '${{ steps.plan.outcome }}';
            const statusIcon = status === 'success' ? '✅' : '❌';

            const body = [
              '## Terraform Plan ' + statusIcon,
              '',
              '#### Initialization `${{ steps.init.outcome }}`',
              '#### Validation `${{ steps.validate.outcome }}`',
              '#### Plan `' + status + '`',
              '',
              '<details><summary>Show Plan Output</summary>',
              '',
              '```terraform',
              truncated,
              '```',
              '',
              '</details>',
              '',
              '*Triggered by @${{ github.actor }} on `${{ github.event_name }}`*',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Terraform Plan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
